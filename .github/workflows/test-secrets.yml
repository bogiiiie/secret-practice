name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Test secret
        env:
          POKEMON_API_KEY: ${{ secrets.POKEMON_API_KEY }}
        run: node index.js