name: Inject Secret and Deploy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Inject Pokemon secret into HTML
        env:
          POKEMON_NAME: ${{ secrets.POKEMON_NAME }}
        run: node inject-secret.js
      
      - name: Upload HTML as artifact (download to view)
        uses: actions/upload-artifact@v4
        with:
          name: pokemon-page
          path: |
            index.html
            index.js