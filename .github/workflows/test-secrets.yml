env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Test Pokemon API Secret

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Test Pokemon with secret key
        env:
          POKEMON_API_KEY: ${{ secrets.POKEMON_API_KEY }}
        run: node index.js