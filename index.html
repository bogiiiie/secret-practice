<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon from GitHub Secret</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .pokemon-image {
            width: 300px;
            height: 300px;
        }
        .info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }
        .info p {
            font-size: 18px;
            margin: 10px 0;
        }
        .secret-note {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 10px;
            margin-top: 20px;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 20px;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Pokemon from GitHub Secret</h1>
        <div class="secret-note">
            🔑 This Pokemon name came from GitHub Secrets (hidden as ***)
        </div>
        
        <div id="loading" class="loading">Loading Pokemon data... ⚡</div>
        <div id="error" class="error" style="display:none;"></div>
        
        <div id="pokemonContent" style="display:none;">
            <img id="pokemonImage" class="pokemon-image" src="" alt="Pokemon">
            <h1 id="pokemonName"></h1>
            <div class="info">
                <p>📏 Height: <span id="height"></span> meters</p>
                <p>⚖️ Weight: <span id="weight"></span> kg</p>
                <p>🔢 Pokedex ID: #<span id="id"></span></p>
                <p>⭐ Base Experience: <span id="baseXp"></span></p>
                <p>🎯 Abilities: <span id="abilities"></span></p>
                <p>💪 Types: <span id="types"></span></p>
            </div>
            <div class="secret-note">
                🎉 Data fetched using GitHub Secret (hidden in logs)
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
